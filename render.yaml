services:
  - type: web
    name: school-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python school/manage.py collectstatic --noinput
    startCommand: python school/manage.py migrate --noinput && gunicorn school.wsgi
    envVars:
      - key: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
    disk: 1024
    autoDeploy: true
    healthCheckPath: /
